<mat-toolbar class="toolbar" *ngIf="authService.isLoggedIn()">
  <button mat-icon-button (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="app-title">Finance Tracker</span>
  <span class="spacer"></span>
  <span class="user-name">{{ authService.getUserName() }}</span>
  <button mat-icon-button (click)="themeService.toggleTheme()" 
    [matTooltip]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
    <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <button mat-icon-button (click)="logout()" matTooltip="Logout">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container" *ngIf="authService.isLoggedIn()">
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">account_balance_wallet</mat-icon>
      <span class="logo-text">ZA Finance</span>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/transactions">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Transactions</span>
      </a>
      <a mat-list-item routerLink="/categories">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Categories</span>
      </a>
      <a mat-list-item routerLink="/budgets">
        <mat-icon matListItemIcon>account_balance_wallet</mat-icon>
        <span matListItemTitle>Budgets</span>
      </a>
      <a mat-list-item routerLink="/exchange-rates">
        <mat-icon matListItemIcon>currency_exchange</mat-icon>
        <span matListItemTitle>Exchange Rates</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>

<div *ngIf="!authService.isLoggedIn()">
  <router-outlet></router-outlet>
</div>
