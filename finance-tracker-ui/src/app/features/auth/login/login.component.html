<div class="login-container">
    <mat-card class="login-card">
        <mat-card-header>
            <mat-card-title>Welcome Back</mat-card-title>
            <mat-card-subtitle>Sign in to your Finance Tracker account</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Email</mat-label>
                <input matInput type="email" [(ngModel)]="email" placeholder="you@example.com" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Password</mat-label>
                <input matInput type="password" [(ngModel)]="password" placeholder="Enter your password" />
            </mat-form-field>

            <p class="error" *ngIf="errorMessage">{{ errorMessage }} </p>
        </mat-card-content>

        <mat-card-actions>
            <button mat-raised-button coloir="primary" class="full-width" (click)="login()">
                Sign In
            </button>
        </mat-card-actions>

        <mat-card-footer>
            <p class="register-link">Don't have an account? <a routerLink="/register">Register here</a></p>
        </mat-card-footer>
    </mat-card>
</div>
