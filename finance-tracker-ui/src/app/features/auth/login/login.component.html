<div class="login-container">
  <div class="login-left">
    <mat-icon class="brand-icon">account_balance_wallet</mat-icon>
    <h1 class="brand-title">ZA Finance</h1>
    <p class="brand-subtitle">Track your income, expenses, and budgets — all in one place.</p>
  </div>

  <div class="login-right">
    <div class="login-card">
      <h2 class="login-title">Welcome back</h2>
      <p class="login-subtitle">Sign in to your account to continue</p>

      <div class="form-group">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email address</mat-label>
          <input matInput type="email" [(ngModel)]="email" placeholder="you@example.com" />
        </mat-form-field>
      </div>

      <div class="form-group">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" [(ngModel)]="password" />
        </mat-form-field>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <mat-icon style="font-size: 18px; width: 18px; height: 18px;">error_outline</mat-icon>
        {{ errorMessage }}
      </div>

      <button mat-raised-button class="login-btn" (click)="login()">
        Sign In
      </button>

      <p class="register-link">
        Don't have an account? <a routerLink="/register">Create one</a>
      </p>
    </div>
  </div>
</div>
