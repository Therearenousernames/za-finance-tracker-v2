<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Create Account</mat-card-title>
      <mat-card-subtitle>Start tracking your finances today</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Full Name</mat-label>
        <input matInput type="text" [(ngModel)]="name" placeholder="Khethelo Njomo" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" placeholder="you@example.com" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" />
      </mat-form-field>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" class="full-width" (click)="register()">
        Create Account
      </button>
    </mat-card-actions>

    <mat-card-footer>
      <p class="login-link">Already have an account? <a routerLink="/login">Sign In</a></p>
    </mat-card-footer>
  </mat-card>
</div>
